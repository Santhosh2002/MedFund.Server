services:
  postgres:
    image: postgres:16-alpine
    container_name: medfund-postgres
    environment:
      POSTGRES_DB: medfund
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - medfund-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medfund"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  medfund-postgres-data:
